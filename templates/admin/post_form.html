<form method="post" enctype="multipart/form-data" class="form-grid admin-form"><input type="hidden" name="_csrf" value="{{ csrf_token() }}"><label>Tiêu đề<input name="title" value="{{ post.title if post else '' }}" required></label><label>Danh mục<input name="category" value="{{ post.category if post else 'Tin tức' }}"></label><label class="full">Mô tả ngắn<textarea name="excerpt" required>{{ post.excerpt if post else '' }}</textarea></label><label class="full">Nội dung<textarea class="editor" name="content" required>{{ post.content if post else '' }}</textarea></label><label>Ảnh đại diện<input type="file" name="image" accept="image/*"></label><label>SEO title<input name="seo_title" value="{{ post.seo_title if post else '' }}"></label><label class="full">SEO description<input name="seo_description" value="{{ post.seo_description if post else '' }}"></label><label class="check"><input type="checkbox" name="is_published" {% if not post or post.is_published %}checked{% endif %}> Xuất bản</label><button class="button full">Lưu bài viết</button></form>
