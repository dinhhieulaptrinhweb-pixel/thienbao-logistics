<form method="post" enctype="multipart/form-data" class="form-grid admin-form"><input type="hidden" name="_csrf" value="{{ csrf_token() }}"><label>Tiêu đề<input name="title" value="{{ service.title if service else '' }}" required></label><label>Icon Font Awesome<input name="icon" value="{{ service.icon if service else 'fa-solid fa-box' }}" placeholder="fa-solid fa-box"></label><label class="full">Mô tả ngắn<textarea name="short_description" required>{{ service.short_description if service else '' }}</textarea></label><label class="full">Nội dung<textarea class="editor" name="content">{{ service.content if service else '' }}</textarea></label><label class="full">FAQ (mỗi câu một dòng)<textarea name="faq">{{ service.faq if service else '' }}</textarea></label><label>Ảnh đại diện<input type="file" name="image" accept="image/*"></label><label>Banner<input type="file" name="banner_image" accept="image/*"></label><label>SEO title<input name="seo_title" value="{{ service.seo_title if service else '' }}"></label><label>SEO description<input name="seo_description" value="{{ service.seo_description if service else '' }}"></label><label>Thứ tự<input type="number" name="sort_order" value="{{ service.sort_order if service else 0 }}"></label><label class="check"><input type="checkbox" name="is_active" {% if not service or service.is_active %}checked{% endif %}> Hiển thị</label><button class="button full">Lưu dịch vụ</button></form>
