<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Đăng nhập quản trị</title><link rel="stylesheet" href="{{ url_for('static',filename='css/admin.css') }}"></head><body class="login-page"><form class="login-card" method="post"><input type="hidden" name="_csrf" value="{{ csrf_token() }}"><h1>THIÊN BẢO</h1><p>Đăng nhập hệ thống quản trị</p>{% with messages=get_flashed_messages(with_categories=true) %}{% for c,m in messages %}<div class="flash {{ c }}">{{ m }}</div>{% endfor %}{% endwith %}<label>Tên đăng nhập<input name="username" required autofocus></label><label>Mật khẩu<input type="password" name="password" required></label><button>Đăng nhập</button><a href="{{ url_for('index') }}">← Quay lại website</a></form></body></html>
