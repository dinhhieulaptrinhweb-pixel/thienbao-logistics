{% extends 'admin/base.html' %}{% block heading %}Trang giới thiệu{% endblock %}{% block content %}<section class="panel"><form method="post" enctype="multipart/form-data" class="form-grid admin-form"><input type="hidden" name="_csrf" value="{{ csrf_token() }}"><h2 class="full">Banner giới thiệu</h2><label>Tiêu đề banner<input name="hero_title" value="{{ about.hero_title or '' }}"></label><label>Ảnh banner<input type="file" name="hero_image" accept="image/*"></label><label class="full">Mô tả banner<textarea name="hero_subtitle">{{ about.hero_subtitle or '' }}</textarea></label><h2 class="full">Thông tin công ty</h2><label>Tiêu đề giới thiệu<input name="intro_title" value="{{ about.intro_title or '' }}"></label><label>Ảnh công ty / đội ngũ<input type="file" name="company_image" accept="image/*"></label><label class="full">Nội dung giới thiệu<textarea class="editor" name="intro_content">{{ about.intro_content or '' }}</textarea></label><label class="full">Lịch sử hình thành<textarea class="editor" name="history">{{ about.history or '' }}</textarea></label><label class="full">Tầm nhìn<textarea class="editor" name="vision">{{ about.vision or '' }}</textarea></label><label class="full">Sứ mệnh<textarea class="editor" name="mission">{{ about.mission or '' }}</textarea></label><label class="full">Giá trị cốt lõi<textarea name="core_values">{{ about.core_values or '' }}</textarea></label><label class="full">Đội ngũ<textarea class="editor" name="team_content">{{ about.team_content or '' }}</textarea></label><label class="full">Thành tựu<textarea name="achievements">{{ about.achievements or '' }}</textarea></label><label class="full">Link video YouTube<input name="video_url" value="{{ about.video_url or '' }}"></label><h2 class="full">SEO</h2><label>SEO title<input name="seo_title" value="{{ about.seo_title or '' }}"></label><label>SEO description<input name="seo_description" value="{{ about.seo_description or '' }}"></label><button class="button full">Lưu trang giới thiệu</button></form></section>{% endblock %}{% block scripts %}<script src="https://cdn.ckeditor.com/ckeditor5/41.4.2/classic/ckeditor.js"></script><script>document.querySelectorAll('.editor').forEach(e=>ClassicEditor.create(e))</script>{% endblock %}
