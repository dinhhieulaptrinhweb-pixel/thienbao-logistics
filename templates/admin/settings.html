{% extends 'admin/base.html' %}{% block heading %}Cấu hình website{% endblock %}{% block content %}<section class="panel"><form method="post" enctype="multipart/form-data" class="form-grid admin-form"><input type="hidden" name="_csrf" value="{{ csrf_token() }}"><h2 class="full">Thương hiệu</h2><label>Tên công ty<input name="company_name" value="{{ values.company_name }}"></label><label>Chữ logo<input name="logo_text" value="{{ values.logo_text }}"></label><label>Logo ảnh<input type="file" name="logo_image" accept="image/*"></label><label>Favicon<input type="file" name="favicon" accept="image/*"></label><h2 class="full">Banner trang chủ</h2><label class="full">Tiêu đề<input name="hero_title" value="{{ values.hero_title }}"></label><label class="full">Mô tả<textarea name="hero_subtitle">{{ values.hero_subtitle }}</textarea></label><label>Ảnh nền banner<input type="file" name="hero_image" accept="image/*"></label><h2 class="full">Liên hệ</h2><label>Hotline<input name="hotline" value="{{ values.hotline }}"></label><label>Email<input type="email" name="email" value="{{ values.email }}"></label><label class="full">Địa chỉ<input name="address" value="{{ values.address }}"></label><label>Facebook<input name="facebook_url" value="{{ values.facebook_url }}"></label><label>Zalo<input name="zalo_url" value="{{ values.zalo_url }}"></label><label>TikTok<input name="tiktok_url" value="{{ values.tiktok_url }}"></label><label>YouTube<input name="youtube_url" value="{{ values.youtube_url }}"></label><label class="full">Google Maps Embed URL<input name="maps_url" value="{{ values.maps_url }}"></label><h2 class="full">Footer và theo dõi</h2><label class="full">Nội dung footer<input name="footer_text" value="{{ values.footer_text }}"></label><label>Copyright<input name="copyright" value="{{ values.copyright }}"></label><label>Địa chỉ website<input name="site_url" value="{{ values.site_url }}"></label><label>Google Analytics ID<input name="ga_id" value="{{ values.ga_id }}"></label><label>Google Tag Manager ID<input name="gtm_id" value="{{ values.gtm_id }}"></label><label>Facebook Pixel ID<input name="facebook_pixel" value="{{ values.facebook_pixel }}"></label><button class="button full">Lưu cấu hình</button></form></section>{% endblock %}
